<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统更新通知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 弹框 */
        .modal {
            background-color: #fff;
            border-radius: 4px;
            width: 680px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .update-notice-header {
            background-color: #165DFF;
            color: #fff;
            padding: 24px 30px;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .update-notice-header .notice-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .update-notice-header .notice-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .update-notice-header .notice-subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        .update-notice-body {
            padding: 24px 30px;
        }

        .update-info-item {
            display: flex;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .update-info-item:last-child {
            margin-bottom: 0;
        }

        .update-info-label {
            color: #666;
            width: 100px;
            flex-shrink: 0;
        }

        .update-info-value {
            color: #333;
            flex: 1;
        }

        .update-content-box {
            background-color: #f8f9fa;
            border-radius: 4px;
            padding: 16px;
            margin-top: 8px;
        }

        .update-content-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .update-content-box li {
            padding: 6px 0;
            font-size: 13px;
            color: #333;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .update-content-box li::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #165DFF;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .update-notice-footer {
            padding: 16px 30px 24px;
            display: flex;
            justify-content: center;
        }

        .btn-know {
            padding: 10px 40px;
            background-color: #165DFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-know:hover {
            background-color: #4080ff;
        }
    </style>
</head>
<body>
    <div class="modal">
        <div class="update-notice-header">
            <div class="notice-icon">&#128640;</div>
            <div class="notice-title">系统更新通知</div>
            <div class="notice-subtitle">放心运数字化运营支撑系统 V2.6.0 版本更新</div>
        </div>
        <div class="update-notice-body">
            <div class="update-info-item">
                <span class="update-info-label">本次更新内容</span>
                <div class="update-info-value">
                    <div class="update-content-box">
                        <ul>
                            <li>新增智能调度算法，优化车辆配载效率，预计提升 15% 运力利用率</li>
                            <li>升级订单追踪系统，支持实时 GPS 定位与轨迹回放功能</li>
                            <li>优化财务结算模块，新增自动对账与电子发票开具功能</li>
                            <li>修复已知问题：部分浏览器下报表导出异常、消息推送延迟等</li>
                            <li>提升系统安全性，升级数据加密传输协议至 TLS 1.3</li>
                            <li>界面交互优化，简化常用操作流程，提升用户体验</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="update-notice-footer">
            <button class="btn-know">我知道了</button>
        </div>
    </div>
</body>
</html>
